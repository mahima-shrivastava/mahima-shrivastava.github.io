    <main class="case-study-main">
        <!-- Password gate: shown in main content area until correct password -->
        <section class="case-study-gate-section" id="ini-gate-section" aria-label="Password required">
            <div class="case-study-gate-bg">
                <div class="case-study-gate-center">
                    <div class="case-study-gate-lock" aria-hidden="true">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </div>
                    <h1 class="case-study-gate-heading">This content is protected.</h1>
                    <p class="case-study-gate-subtext">To view the IBM Network Intelligence case study, please enter the password.</p>
                    <form class="case-study-gate-form" id="ini-gate-form" autocomplete="off">
                        <div class="case-study-gate-input-wrap" id="ini-gate-input-wrap">
                            <input type="password" id="ini-gate-password" class="case-study-gate-input" placeholder="Enter password" required aria-label="Password" aria-describedby="ini-gate-error">
                            <button type="submit" class="case-study-gate-arrow" aria-label="Submit password">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                            </button>
                        </div>
                        <p class="case-study-gate-error" id="ini-gate-error" aria-live="polite" role="alert"></p>
                    </form>
                    <a href="work.html" class="case-study-gate-back">Back to portfolio</a>
                </div>
            </div>
        </section>

            <div class="container">
                <div class="case-study-mro-hero-wrap">
                    <img src="assets/ibm-inicasestudytop.png" alt="IBM Network Intelligence" class="case-study-mro-hero-img" loading="eager">
                </div>
            </div>
        </section>
        <section class="case-study-bottom-section">

        <script>
            (function(){ document.querySelectorAll('.case-study-mro-hero-wrap').forEach(function(wrap){ var img=wrap.querySelector('.case-study-mro-hero-img'); if(!img) return; if(img.complete && img.naturalWidth) wrap.classList.add('loaded'); else img.onload=function(){ wrap.classList.add('loaded'); }; }); })();
        </script>
        </div>

                        </svg>
                    </a>
                    <a href="mailto:mahima@example.com" class="social-icon" aria-label="Email">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" fill="currentColor"/>

    <script src="script.js"></script>
    <script>
        (function() {
            var GATE_ID = 'ini-gate-section';
            var CONTENT_ID = 'ini-content-wrap';
            var FORM_ID = 'ini-gate-form';
            var INPUT_ID = 'ini-gate-password';
            var INPUT_WRAP_ID = 'ini-gate-input-wrap';
            var ERROR_ID = 'ini-gate-error';
            var STORAGE_KEY = 'ini_case_study_unlocked';
            var PASSWORD = '1234';

            var gateSection = document.getElementById(GATE_ID);
            var contentWrap = document.getElementById(CONTENT_ID);
            var form = document.getElementById(FORM_ID);
            var input = document.getElementById(INPUT_ID);
            var inputWrap = document.getElementById(INPUT_WRAP_ID);
            var errorEl = document.getElementById(ERROR_ID);

            function showContent() {
                gateSection.classList.add('case-study-gate-hidden');
                contentWrap.setAttribute('aria-hidden', 'false');
                contentWrap.classList.add('case-study-content-visible');
            }

            if (sessionStorage.getItem(STORAGE_KEY) === '1') {
                showContent();
                return;
            }

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                errorEl.textContent = '';
                inputWrap.classList.remove('case-study-gate-input-error');
                if (input.value === PASSWORD) {
                    sessionStorage.setItem(STORAGE_KEY, '1');
                    gateSection.classList.add('case-study-gate-fade-out');
                    setTimeout(function() {
                        showContent();
                        gateSection.classList.remove('case-study-gate-fade-out');
                    }, 300);
                } else {
                    errorEl.textContent = 'Incorrect password. Please try again.';
                    inputWrap.classList.add('case-study-gate-input-error');
                    inputWrap.classList.add('case-study-gate-shake');
                    setTimeout(function() { inputWrap.classList.remove('case-study-gate-shake'); }, 500);
                    input.focus();
                }
            });
        })();
    </script>
